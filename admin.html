<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D校园投诉系统 - 学校后台</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

<!-- ═══ 登录页 ═══ -->
<div id="login-page" class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">🔐</div>
    <h1>学校管理后台</h1>
    <p class="login-sub">3D 校园投诉系统 · 管理员登录</p>
    <div class="login-form">
      <div class="form-group">
        <label>管理员账号</label>
        <input type="text" id="admin-account" placeholder="请输入账号" autocomplete="off">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="admin-password" placeholder="请输入密码">
      </div>
      <button class="btn btn-primary" onclick="adminLogin()">登录</button>
      <div class="login-hint">默认账号：admin / 密码：admin123</div>
    </div>
  </div>
</div>

<!-- ═══ 后台主体 ═══ -->
<div id="admin-page" class="admin-layout" style="display:none;">
  <header class="admin-header">
    <div class="header-left">
      <span class="logo">🏫</span>
      <h1>校园投诉管理后台</h1>
    </div>
    <div class="header-right">
      <span class="admin-info">管理员 admin</span>
      <button class="logout-btn" onclick="adminLogout()">退出登录</button>
    </div>
  </header>

  <main class="admin-main">
    <!-- 统计卡片 -->
    <div class="stats-grid" id="stats-grid"></div>

    <!-- 筛选栏 -->
    <div class="filter-bar">
      <label>方向：</label>
      <select id="filter-category">
        <option value="">全部</option>
        <option value="hygiene">卫生问题</option>
        <option value="safety">安全隐患</option>
        <option value="other">其他</option>
      </select>
      <label>状态：</label>
      <select id="filter-status">
        <option value="">全部</option>
        <option value="pending">待回复</option>
        <option value="replied">已回复</option>
      </select>
      <label>搜索：</label>
      <input type="text" id="filter-search" placeholder="建筑/内容/投诉人...">
      <button class="clear-btn" onclick="clearFilters()">清空筛选</button>
    </div>

    <!-- 投诉列表 -->
    <div class="complaint-table-wrap">
      <div class="table-header">
        <h2>投诉列表</h2>
        <span class="count" id="list-count"></span>
      </div>
      <div id="table-content"></div>
    </div>
  </main>
</div>

<!-- ═══ 详情/回复弹窗 ═══ -->
<div id="detail-modal">
  <div class="modal-card">
    <div class="modal-header">
      <h2 id="modal-title">投诉详情</h2>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<script src="js/storage.js"></script>
<script src="js/campus-data.js"></script>
<script>
// ═══ Toast ═══
function showToast(msg, type='info') {
  const toast = document.getElementById('toast');
  toast.className = type;
  toast.innerHTML = `<span class="toast-icon">${type==='success'?'✅':type==='error'?'❌':'ℹ️'}</span>${msg}`;
  toast.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

// ═══ 登录状态 ═══
const ADMIN_ACCOUNT = 'admin';
const ADMIN_PASSWORD = 'admin123';

function checkLogin() {
  if (localStorage.getItem('qau_admin') === '1') {
    showAdmin();
  }
}

function adminLogin() {
  const acc = document.getElementById('admin-account').value.trim();
  const pwd = document.getElementById('admin-password').value.trim();
  if (!acc || !pwd) { showToast('请输入账号和密码', 'error'); return; }
  if (acc === ADMIN_ACCOUNT && pwd === ADMIN_PASSWORD) {
    localStorage.setItem('qau_admin', '1');
    showToast('登录成功', 'success');
    setTimeout(showAdmin, 500);
  } else {
    showToast('账号或密码错误', 'error');
  }
}

function adminLogout() {
  localStorage.removeItem('qau_admin');
  document.getElementById('admin-page').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('admin-account').value = '';
  document.getElementById('admin-password').value = '';
}

function showAdmin() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('admin-page').style.display = 'flex';
  renderAll();
}

// ═══ 渲染统计 ═══
function renderStats() {
  const list = Store.getComplaints();
  const stats = {
    total: list.length,
    hygiene: list.filter(c => c.category === 'hygiene').length,
    safety: list.filter(c => c.category === 'safety').length,
    other: list.filter(c => c.category === 'other').length,
    pending: list.filter(c => c.status === 'pending').length
  };
  const cards = [
    { key:'total', icon:'📊', num:stats.total, label:'投诉总数' },
    { key:'hygiene', icon:'🧹', num:stats.hygiene, label:'卫生问题' },
    { key:'safety', icon:'⚠️', num:stats.safety, label:'安全隐患' },
    { key:'other', icon:'📋', num:stats.other, label:'其他' },
    { key:'pending', icon:'⏳', num:stats.pending, label:'待回复' }
  ];
  document.getElementById('stats-grid').innerHTML = cards.map(c => `
    <div class="stat-card ${c.key}">
      <div class="stat-icon">${c.icon}</div>
      <div class="stat-info">
        <div class="num">${c.num}</div>
        <div class="label">${c.label}</div>
      </div>
    </div>
  `).join('');
}

// ═══ 筛选 ═══
function getFilteredList() {
  let list = Store.getComplaints();
  const cat = document.getElementById('filter-category').value;
  const status = document.getElementById('filter-status').value;
  const search = document.getElementById('filter-search').value.trim().toLowerCase();

  if (cat) list = list.filter(c => c.category === cat);
  if (status) list = list.filter(c => c.status === status);
  if (search) {
    list = list.filter(c =>
      (c.buildingName && c.buildingName.toLowerCase().includes(search)) ||
      (c.content && c.content.toLowerCase().includes(search)) ||
      (c.reporter && c.reporter.toLowerCase().includes(search))
    );
  }
  return list;
}

// ═══ 渲染列表 ═══
function renderTable() {
  const list = getFilteredList();
  const content = document.getElementById('table-content');

  document.getElementById('list-count').textContent = `共 ${list.length} 条`;

  if (list.length === 0) {
    content.innerHTML = `
      <div class="empty-state">
        <div class="icon">📭</div>
        <p>暂无投诉记录</p>
      </div>`;
    return;
  }

  content.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>投诉地点</th>
          <th>投诉方向</th>
          <th>投诉人员</th>
          <th>投诉内容</th>
          <th>提交时间</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        ${list.map(c => `
          <tr>
            <td><strong>${c.buildingName}</strong></td>
            <td><span class="cat-tag ${c.category}">${c.categoryName}</span></td>
            <td>${c.reporter}</td>
            <td class="content-cell"><div class="text">${escapeHtml(c.content)}</div></td>
            <td style="white-space:nowrap;font-size:13px;color:var(--text-light);">${formatTime(c.createdAt)}</td>
            <td><span class="status-tag ${c.status}">${c.status==='pending'?'待回复':'已回复'}</span></td>
            <td style="white-space:nowrap;">
              <button class="action-btn view" onclick="viewDetail('${c.id}')">详情</button>
              <button class="action-btn reply" onclick="openReply('${c.id}')">回复</button>
              <button class="action-btn delete" onclick="deleteComplaint('${c.id}')">删除</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function renderAll() {
  renderStats();
  renderTable();
}

// ═══ 详情/回复 ═══
function viewDetail(id) {
  const c = Store.getComplaints().find(x => x.id === id);
  if (!c) return;
  document.getElementById('modal-title').textContent = '投诉详情';
  document.getElementById('modal-body').innerHTML = `
    <div class="detail-row"><div class="label">投诉地点</div><div class="value"><strong>${c.buildingName}</strong></div></div>
    <div class="detail-row"><div class="label">投诉方向</div><div class="value"><span class="cat-tag ${c.category}">${c.categoryName}</span></div></div>
    <div class="detail-row"><div class="label">投诉人员</div><div class="value">${c.reporter}</div></div>
    <div class="detail-row"><div class="label">提交时间</div><div class="value">${formatTime(c.createdAt)}</div></div>
    <div class="detail-row"><div class="label">投诉内容</div><div class="value"><div class="content-box">${escapeHtml(c.content)}</div></div></div>
    <div class="detail-row"><div class="label">回复状态</div><div class="value"><span class="status-tag ${c.status}">${c.status==='pending'?'待回复':'已回复'}</span></div></div>
    ${c.reply ? `<div class="detail-row"><div class="label">学校回复</div><div class="value"><div class="content-box" style="background:#e8f5e0;">${escapeHtml(c.reply)}</div></div></div>` : ''}
  `;
  document.getElementById('detail-modal').classList.add('show');
}

function openReply(id) {
  const c = Store.getComplaints().find(x => x.id === id);
  if (!c) return;
  document.getElementById('modal-title').textContent = '回复投诉';
  document.getElementById('modal-body').innerHTML = `
    <div class="detail-row"><div class="label">投诉地点</div><div class="value"><strong>${c.buildingName}</strong></div></div>
    <div class="detail-row"><div class="label">投诉方向</div><div class="value"><span class="cat-tag ${c.category}">${c.categoryName}</span></div></div>
    <div class="detail-row"><div class="label">投诉内容</div><div class="value"><div class="content-box">${escapeHtml(c.content)}</div></div></div>
    <div class="reply-section">
      <label>学校回复内容</label>
      <textarea id="reply-text" placeholder="请输入回复内容...">${c.reply || ''}</textarea>
      <button class="btn btn-primary" onclick="submitReply('${c.id}')">提交回复</button>
    </div>
  `;
  document.getElementById('detail-modal').classList.add('show');
}

function submitReply(id) {
  const text = document.getElementById('reply-text').value.trim();
  if (!text) { showToast('请输入回复内容', 'error'); return; }
  const result = checkReplySensitive(text);
  if (!result.passed) { showToast(result.message, 'error'); return; }
  Store.updateComplaint(id, { reply: text, status: 'replied' });
  showToast('回复成功', 'success');
  closeModal();
  renderAll();
}

function deleteComplaint(id) {
  if (!confirm('确定删除该投诉记录？此操作不可撤销。')) return;
  Store.deleteComplaint(id);
  showToast('已删除', 'success');
  renderAll();
}

function closeModal() {
  document.getElementById('detail-modal').classList.remove('show');
}

// 回复内容也做基础敏感词校验
function checkReplySensitive(text) {
  if (typeof checkSensitive === 'function') {
    return checkSensitive(text);
  }
  return { passed: true };
}

// ═══ 工具函数 ═══
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function formatTime(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function clearFilters() {
  document.getElementById('filter-category').value = '';
  document.getElementById('filter-status').value = '';
  document.getElementById('filter-search').value = '';
  renderTable();
}

// ═══ 事件绑定 ═══
document.getElementById('filter-category').addEventListener('change', renderTable);
document.getElementById('filter-status').addEventListener('change', renderTable);
document.getElementById('filter-search').addEventListener('input', renderTable);
document.getElementById('detail-modal').addEventListener('click', (e) => {
  if (e.target.id === 'detail-modal') closeModal();
});
document.getElementById('admin-password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') adminLogin();
});

// 回车登录
document.getElementById('admin-account').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('admin-password').focus();
});

// 加载敏感词库脚本（后台也需要）
const sScript = document.createElement('script');
sScript.src = 'js/sensitive-words.js';
document.head.appendChild(sScript);

// 初始化
checkLogin();
</script>
</body>
</html>
